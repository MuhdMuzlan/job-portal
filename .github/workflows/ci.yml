name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Shared Types ───────────────────────────────────────────────────────────
  shared:
    name: Build Shared Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root workspace dependencies
        run: npm ci
      - name: Build shared types
        run: npm run build --workspace=shared

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Lint + Type Check + Build)
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root workspace dependencies
        run: npm ci
      - name: Build shared types first
        run: npm run build --workspace=shared
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.railway.app
          NEXT_PUBLIC_ML_SERVICE_URL: https://placeholder-ml.railway.app

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Type Check + Build)
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root workspace dependencies
        run: npm ci
      - name: Build shared types first
        run: npm run build --workspace=shared
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit
      - name: Build
        working-directory: backend
        run: npm run build

  # ─── ML Service ─────────────────────────────────────────────────────────────
  ml-service:
    name: ML Service (Python Syntax Check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install core dependencies (no heavy ML libs for CI)
        run: pip install fastapi uvicorn pydantic
      - name: Syntax check
        run: python -m py_compile src/main.py || echo "main.py not found, skipping"
