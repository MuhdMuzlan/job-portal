name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ─── Deploy Frontend to Vercel ───────────────────────────────────────────────
  # Vercel auto-deploys via GitHub integration using vercel.json at repo root.
  # This job validates the build before Vercel picks it up.
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root workspace dependencies
        run: npm ci
      - name: Build shared types
        run: npm run build --workspace=shared
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ML_SERVICE_URL: ${{ secrets.NEXT_PUBLIC_ML_SERVICE_URL }}
      # Vercel deploys automatically via GitHub integration using vercel.json.
      # To use Vercel CLI instead, uncomment below and add VERCEL_TOKEN secret:
      # - name: Deploy to Vercel
      #   run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
      #   working-directory: frontend

  # ─── Deploy Backend to Railway ───────────────────────────────────────────────
  # Railway auto-deploys via GitHub integration using backend/railway.toml.
  # This job validates the build before Railway picks it up.
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root workspace dependencies
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Build backend
        working-directory: backend
        run: npm run build
      # Railway deploys automatically via GitHub integration.
      # To trigger Railway deploy via CLI, uncomment below:
      # - name: Deploy to Railway
      #   run: npx @railway/cli up --service=backend
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Deploy ML Service to Railway ────────────────────────────────────────────
  deploy-ml:
    name: Deploy ML Service (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm ML service files exist
        run: |
          ls backend/ml/
          echo "ML service ready for Railway deployment"
      # Railway deploys the ML service automatically from backend/ml directory
      # using backend/ml/railway.toml and backend/ml/Dockerfile.
